<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Любишь ли ты меня?</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      height: 100vh;
      position: relative;
    }

    .emoji {
      position: fixed;
      font-size: 30px;
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 1;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }

    .container {
      position: fixed;
      inset: 4%;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-size: clamp(32px, 5vw, 64px);
      margin: 0 0 40px 0;
      color: #ff3d6e;
    }

    .buttons {
      position: relative;
      width: 100%;
      height: 220px;
      max-width: 900px;
    }

    button {
      font-size: 28px;
      padding: 18px 42px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    #yes {
      position: absolute;
      left: 55%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #ff4d88;
      color: white;
      z-index: 3;
    }

    #yes:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    #no {
      position: absolute;
      left: 35%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #e9e9e9;
      color: #222;
      z-index: 3;
    }

    #no:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    #message {
      margin-top: 25px;
      font-size: clamp(22px, 3vw, 36px);
      color: #333;
      min-height: 50px;
      max-width: 900px;
    }

    @media (max-width: 700px) {
      .buttons {
        height: 260px;
      }

      #no {
        left: 30%;
        top: 55%;
      }

      #yes {
        left: 70%;
        top: 55%;
      }

      button {
        font-size: 22px;
        padding: 14px 26px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Любишь ли ты меня? 💖</h1>

    <div class="buttons">
      <button id="no">Нет</button>
      <button id="yes">Да</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");
    const message = document.getElementById("message");
    const buttonsArea = document.querySelector(".buttons");

    let yesCanRun = true;

    function createEmoji() {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = Math.random() > 0.5 ? "🍌" : "💖";
      el.style.left = Math.random() * 100 + "vw";
      el.style.bottom = "-40px";
      el.style.animationDuration = (6 + Math.random() * 5) + "s";
      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 11000);
    }

    setInterval(createEmoji, 350);

    noBtn.addEventListener("mouseenter", () => {
      message.textContent = "Аж ты ж курва, не любишь получается 😡";
    });

    yesBtn.addEventListener("mouseenter", () => {
      if (!yesCanRun) return;

      const areaRect = buttonsArea.getBoundingClientRect();
      const btnRect = yesBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      const newX = Math.max(0, Math.random() * maxX);
      const newY = Math.max(0, Math.random() * maxY);

      yesBtn.style.left = newX + "px";
      yesBtn.style.top = newY + "px";
      yesBtn.style.transform = "none";
    });

    setTimeout(() => {
      yesCanRun = false;
    }, 8000);

    yesBtn.addEventListener("click", () => {
      message.textContent = "Упорная и я тебя люблю жопка моя ❤️";
    });
  </script>

</body>
</html>
