<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Любишь ли ты меня?</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffb6c1, #ffc0cb, #ffd1dc);
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      height: 80vh;
      background: white;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 40px;
      color: #ff4d88;
      font-size: 40px;
    }

    button {
      padding: 15px 30px;
      margin: 20px;
      border: none;
      border-radius: 15px;
      font-size: 22px;
      cursor: pointer;
      position: relative;
    }

    .yes { background: #ff4d88; color: white; }
    .no { background: #ccc; }

    .floating {
      position: absolute;
      font-size: 30px;
      animation: float linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    /* Кастомное модальное окно */
    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      height: 50vh;
      background: #1e1e1e;
      color: white;
      border-radius: 20px;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .modal button {
      margin-top: 20px;
      background: #4da6ff;
      color: white;
      padding: 10px 25px;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Любишь ли ты меня? ❤️</h1>
  <button class="yes" id="yesBtn">Да</button>
  <button class="no" id="noBtn">Нет</button>
</div>

<div class="modal" id="modal">
  <div id="modalText" style="font-size: 26px;"></div>
  <button onclick="closeModal()">OK</button>
</div>

<script>
  function createFloating() {
    const el = document.createElement('div');
    el.className = 'floating';
    el.innerText = Math.random() > 0.5 ? '🍌' : '💖';

    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (5 + Math.random() * 5) + 's';
    el.style.fontSize = (20 + Math.random() * 30) + 'px';

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 10000);
  }

  setInterval(createFloating, 500);

  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const modal = document.getElementById('modal');
  const modalText = document.getElementById('modalText');

  function showModal(text) {
    modalText.innerText = text;
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
  }

  noBtn.addEventListener('click', () => {
    showModal('аж ты ж курва, не любишь получается 😢');
  });

  let escapeTime = Date.now() + (5000 + Math.random() * 5000);

  function moveYesButton() {
    if (Date.now() < escapeTime) {
      yesBtn.style.position = 'absolute';
      yesBtn.style.left = Math.random() * 80 + '%';
      yesBtn.style.top = Math.random() * 80 + '%';
    }
  }

  yesBtn.addEventListener('mouseover', moveYesButton);

  yesBtn.addEventListener('click', () => {
    showModal('Упорная 😏 и я тебя люблю, жопка моя ❤️');
  });
</script>

</body>
</html>
